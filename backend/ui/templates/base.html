<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BATUHAN — {% block title %}ISO Audit Automation{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8FAFC; --surface: #FFFFFF; --border: #E2E8F0; --border-hover: #CBD5E1;
      --primary: #2563EB; --primary-hover: #1D4ED8; --primary-light: #EFF6FF;
      --success: #10B981; --success-light: #ECFDF5;
      --danger: #EF4444; --danger-light: #FEF2F2;
      --warning: #F59E0B; --warning-light: #FFFBEB;
      --text: #0F172A; --text-secondary: #334155; --muted: #64748B; --muted-light: #94A3B8;
      --radius: 10px; --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px -1px rgba(0,0,0,.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .logo { display: flex; align-items: center; gap: .6rem; font-weight: 700; font-size: 1.05rem; color: var(--text); text-decoration: none; letter-spacing: -.01em; }
    .logo-icon { width: 30px; height: 30px; background: var(--primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-size: .85rem; }
    header nav { display: flex; align-items: center; gap: .5rem; }
    header nav a { color: var(--muted); text-decoration: none; font-size: .875rem; font-weight: 500; padding: .4rem .85rem; border-radius: var(--radius-sm); transition: all .15s; }
    header nav a:hover { color: var(--primary); background: var(--primary-light); }
    header nav a.nav-cta { background: var(--primary); color: #fff; }
    header nav a.nav-cta:hover { background: var(--primary-hover); }
    main { max-width: 1100px; margin: 2.5rem auto; padding: 0 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em; }
    h2 { font-size: 1.05rem; font-weight: 600; color: var(--text-secondary); }
    h3 { font-size: .9rem; font-weight: 600; color: var(--text); }
    .page-title { font-size: 1.75rem; font-weight: 700; letter-spacing: -.03em; margin-bottom: .35rem; }
    .page-subtitle { color: var(--muted); font-size: .95rem; }
    label, .label { display: block; font-size: .75rem; font-weight: 700; margin-bottom: .4rem; color: var(--text); letter-spacing: .04em; text-transform: uppercase; }
    .field { margin-bottom: 1.5rem; }
    select { width: 100%; padding: .6rem .85rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: .9rem; background: var(--surface); color: var(--text); font-family: inherit; transition: border-color .15s, box-shadow .15s; outline: none; }
    select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .65rem 1.4rem; border: none; border-radius: var(--radius-sm); font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .15s; text-decoration: none; font-family: inherit; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }
    .btn-secondary { background: var(--surface); color: var(--text-secondary); border: 1.5px solid var(--border); }
    .btn-secondary:hover { border-color: var(--border-hover); background: var(--bg); }
    .btn-lg { padding: .8rem 1.75rem; font-size: .95rem; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .alert { border-radius: var(--radius-sm); padding: .9rem 1rem; font-size: .875rem; margin-bottom: 1.25rem; display: flex; gap: .75rem; align-items: flex-start; }
    .alert-danger { background: var(--danger-light); border: 1px solid #FCA5A5; color: #B91C1C; }
    .alert-success { background: var(--success-light); border: 1px solid #6EE7B7; color: #065F46; }
    .alert-info { background: var(--primary-light); border: 1px solid #BFDBFE; color: #1E40AF; }
    .hint { font-size: .8rem; color: var(--muted); margin-top: .4rem; line-height: 1.55; }
    .section-label { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .75rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); }
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; color: var(--muted-light); font-size: .78rem; padding: 2.5rem 1.5rem; border-top: 1px solid var(--border); margin-top: 3rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="logo" href="/ui">
        <div class="logo-icon">⚡</div>
        <span>BATUHAN</span>
      </a>
      <nav>
        <a href="/ui/guide">How to Use</a>
        <a href="/ui/calculator">⏱ Audit Calculator</a>
        <a href="/ui" class="nav-cta">+ New Job</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>BATUHAN · AI-Powered ISO Audit Report System · For authorised personnel only</footer>
</body>
</html>
