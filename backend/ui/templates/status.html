{% extends "base.html" %}
{% block title %}Job Progress — {{ job_id[:8] }}{% endblock %}

{% block head %}
<style>
  .job-tag { font-family: 'Courier New', monospace; background: var(--bg); padding: .2rem .6rem; border-radius: var(--radius-sm); font-size: .8rem; color: var(--muted); border: 1px solid var(--border); }
  .progress-outer { background: var(--bg); border-radius: 99px; height: 8px; overflow: hidden; border: 1px solid var(--border); margin: 1.25rem 0; }
  .progress-inner { height: 100%; border-radius: 99px; background: var(--primary); transition: width .5s ease; }
  .progress-inner.done { background: var(--success); }
  .progress-inner.failed { background: var(--danger); }
  .step-list { display: flex; flex-direction: column; gap: .35rem; margin: 1rem 0; }
  .step-row { display: flex; align-items: center; gap: .85rem; padding: .65rem 1rem; border-radius: var(--radius-sm); background: var(--bg); font-size: .875rem; color: var(--muted); border: 1px solid transparent; transition: all .2s; }
  .step-row.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-color: #BFDBFE; }
  .step-row.done { background: var(--success-light); color: #065F46; border-color: #A7F3D0; }
  .step-row.failed { background: var(--danger-light); color: #B91C1C; border-color: #FCA5A5; }
  .step-icon { width: 18px; text-align: center; flex-shrink: 0; font-size: .85rem; }
  .step-est { margin-left: auto; font-size: .72rem; color: var(--muted-light); font-style: italic; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-top: 1.25rem; }
  .stat-cell { background: var(--bg); border-radius: var(--radius-sm); padding: .75rem 1rem; border: 1px solid var(--border); }
  .stat-label { color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; margin-bottom: .3rem; }
  .stat-val { font-weight: 600; color: var(--text); font-size: .95rem; }
  .error-banner { margin-top: 1rem; background: var(--danger-light); border: 1px solid #FCA5A5; border-radius: var(--radius-sm); padding: 1rem; font-size: .875rem; color: #B91C1C; }
</style>
{% endblock %}

{% block content %}
<div class="card" style="max-width:660px; margin:0 auto;">
  <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:1.5rem;">
    <div>
      <h1>Job Progress</h1>
      <div style="margin-top:.4rem;"><span style="color:var(--muted); font-size:.875rem;">Job ID: </span><span class="job-tag">{{ job_id }}</span></div>
    </div>
    <a href="/ui" class="btn btn-secondary">+ New Job</a>
  </div>

  <div style="display:flex; justify-content:space-between; font-size:.8rem; color:var(--muted); margin-bottom:.35rem;">
    <span id="statusLabel">Connecting…</span>
    <span id="pct" style="font-weight:700; color:var(--text);">0%</span>
  </div>
  <div class="progress-outer"><div class="progress-inner" id="progressFill" style="width:0%"></div></div>

  <div class="step-list" id="stepList"></div>

  <div id="errorBanner" class="error-banner" style="display:none;"></div>

  <div class="stat-grid">
    <div class="stat-cell"><div class="stat-label">Elapsed</div><div class="stat-val" id="elapsedVal">0s</div></div>
    <div class="stat-cell"><div class="stat-label">Estimated Total</div><div class="stat-val">10–15 min</div></div>
  </div>
  <div style="margin-top:.85rem; font-size:.75rem; color:var(--muted-light); text-align:right;" id="refreshNote">🔄 Auto-refreshing every 4s…</div>
</div>

<script>
const JOB_ID = "{{ job_id }}";
const STEPS = [
  {key:"QUEUED",        label:"Queued",                        est:"< 1 min"},
  {key:"PREPROCESSING", label:"Preprocessing files",           est:"~30 sec"},
  {key:"STEP_A",        label:"Step A — Evidence Extraction",  est:"~2–4 min"},
  {key:"STEP_B",        label:"Step B — Report Generation",    est:"~3–5 min"},
  {key:"STEP_C",        label:"Step C — Validation",           est:"~2–4 min"},
  {key:"ASSEMBLING",    label:"Assembling Final Document",      est:"~30 sec"},
  {key:"COMPLETE",      label:"Complete",                       est:""},
];
const PROGRESS = {QUEUED:2,PREPROCESSING:10,STEP_A:25,STEP_B:55,STEP_C:78,ASSEMBLING:92,COMPLETE:100,FAILED:100};
let startTime = Date.now();

function renderSteps(state) {
  const idx = STEPS.findIndex(s => s.key === state);
  document.getElementById('stepList').innerHTML = STEPS.map((s, i) => {
    const isDone = state === 'COMPLETE' || i < idx;
    let cls = '', icon = '○';
    if (isDone) { cls = 'done'; icon = '✓'; }
    else if (i === idx) { cls = state === 'FAILED' ? 'failed' : 'active'; icon = state === 'FAILED' ? '✕' : '◉'; }
    const est = cls === 'active' ? `<span class="step-est">${s.est}</span>` : '';
    return `<div class="step-row ${cls}"><span class="step-icon">${icon}</span><span>${s.label}</span>${est}</div>`;
  }).join('');
}

async function poll() {
  try {
    const res = await fetch(`/jobs/${JOB_ID}/status`);
    if (!res.ok) { setTimeout(poll, 4000); return; }
    const data = await res.json();
    const state = data.state;
    const pct = PROGRESS[state] || 0;
    const fill = document.getElementById('progressFill');
    fill.style.width = pct + '%';
    fill.className = 'progress-inner' + (state==='COMPLETE'?' done':state==='FAILED'?' failed':'');
    document.getElementById('pct').textContent = pct + '%';
    document.getElementById('statusLabel').textContent = data.current_step || state.replace(/_/g,' ');
    renderSteps(state);
    const elapsed = Math.round((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed/60), s = elapsed%60;
    document.getElementById('elapsedVal').textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
    if (state === 'FAILED') {
      document.getElementById('errorBanner').style.display = 'block';
      document.getElementById('errorBanner').textContent = '⚠ ' + (data.error_message || 'An unknown error occurred.');
      document.getElementById('refreshNote').textContent = ''; return;
    }
    if (state === 'COMPLETE') {
      document.getElementById('refreshNote').textContent = '✅ Done! Redirecting…';
      setTimeout(() => { window.location.href = `/ui/results/${JOB_ID}`; }, 1500); return;
    }
    setTimeout(poll, 4000);
  } catch(e) { setTimeout(poll, 5000); }
}
renderSteps('QUEUED');
poll();
</script>
{% endblock %}
