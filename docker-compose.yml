# BATUHAN — Docker Compose (production / local-prod)
# Usage:
#   cp backend/.env.example backend/.env   # fill in real values
#   docker compose up --build
#
# Services:
#   redis    — message broker for Celery
#   api      — FastAPI application server (uvicorn)
#   worker   — Celery background worker (runs the pipeline)

version: "3.9"

services:

  # -----------------------------------------------------------------------
  # Redis — message broker + Celery result backend
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # API — FastAPI served by uvicorn
  # -----------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override Redis URLs to use the docker service name
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_BASE_PATH: /app/storage
      PROMPTS_DIR: /app/prompts
    volumes:
      - batuhan_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------------------
  # Worker — Celery pipeline worker
  # -----------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Override the default CMD to start Celery instead of uvicorn
    command: >
      celery -A backend.jobs.tasks worker
      --loglevel=info
      --concurrency=2
      --queues=celery
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_BASE_PATH: /app/storage
      PROMPTS_DIR: /app/prompts
    volumes:
      - batuhan_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy

# -----------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------
volumes:
  batuhan_storage:
    driver: local

